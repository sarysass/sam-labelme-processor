# SAM 模型配置
sam:
  weights: "/Users/shali/projects/MicroHunter/weights/sam2.1_t.pt"
  device: "mps"
  imgsz: 1024
  iou_threshold: 0.3

# 输出设置
output:
  separate: true
  combine: false

# 数据路径
data:
  root: "./data/demo_data"
  images_dir: "images"
  bbox_dir: "labels"
  mask_dir: "mask"
  combined_dir: "output/combined"

# 批处理设置
processing:
  batch_size: 20
  num_workers: 1
  enable_checkpoint: true
  checkpoint_interval: 100
  enable_resume: true
  max_retries: 3
  retry_delay: 5
  memory_limit_gb: 12
  enable_memory_watch: true
  preload_images: false
  image_cache_size: 10
  skip_empty_labels: true

# 日志
logging:
  level: "INFO"
  file: "logs/demo_processor.log"
